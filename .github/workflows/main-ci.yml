name: Spring Boot CI/CD

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # BUILD (1 seule fois)
  # =========================
  build:
    name: 🧱 Build Spring Boot App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build JAR
        run: ./mvnw clean package -DskipTests

      # Upload uniquement du fat jar (évite l'ambiguïté avec tracking-api-plain.jar)
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/tracking-api.jar

  # =========================
  # DOCKER
  # =========================
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # JDK requis pour mvn help:evaluate et mvn versions:set
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # Télécharger le jar buildé précédemment
      - name: Download jar
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      # =========================
      # VERSION
      # =========================
      - name: Get and bump version from pom.xml
        id: version
        run: |
          OLD_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          ./mvnw versions:set -DnewVersion=$NEW_VERSION -DgenerateBackupPoms=false

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit new version
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git add pom.xml
          # [skip ci] empêche le workflow de se re-déclencher sur ce commit
          git commit -m "🔖 Bump version to ${{ steps.version.outputs.version }} [skip ci]" || echo "No changes"
          git pull --rebase origin main || echo "Nothing to rebase"
          git push || echo "No push"

      # =========================
      # DOCKER
      # =========================
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tracking-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tracking-api:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
